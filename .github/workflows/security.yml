name: Security Checks

# Run on every pull request that targets main.
on:
  pull_request:
    branches: [ main ]

# Needed so the tools can write findings back to the PR.
permissions:
  contents: read
  pull-requests: write
  security-events: write

jobs:

  # 1. SECRET SCAN -- looks for passwords, API keys, tokens.
  secret-scan:
    name: Secret Scan (Gitleaks)
    runs-on: ubuntu-latest
    steps:
      - name: Get the code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # 2. SAST -- reads the code for dangerous patterns (RCE, eval, injection).
  sast:
    name: SAST (Semgrep)
    runs-on: ubuntu-latest
    container:
      image: semgrep/semgrep
    steps:
      - name: Get the code
        uses: actions/checkout@v4
      - name: Run Semgrep
        run: semgrep scan --config=p/default --config=p/secrets --error

  # 3. SCA -- flags newly added third-party packages with known CVEs.
  dependency-review:
    name: SCA (Dependency Review)
    runs-on: ubuntu-latest
    steps:
      - name: Get the code
        uses: actions/checkout@v4
      - name: Review dependencies
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high

  # 4. CONTAINER SCAN -- builds the Docker image and scans it.
  container-scan:
    name: Container Scan (Trivy)
    runs-on: ubuntu-latest
    steps:
      - name: Get the code
        uses: actions/checkout@v4
      - name: Build the image
        run: docker build -t demo-app:test .
      - name: Run Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: demo-app:test
          format: table
          exit-code: 1
          ignore-unfixed: true
          severity: CRITICAL,HIGH
